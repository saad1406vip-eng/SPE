<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPE - Saad Pro Estimate | حاسبة الأسعار العادلة</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #e94560;
            --accent: #0f3460;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1a1a2e;
            --border: #e2e8f0;
            --fair-price: #10b981;
            --shadow: 0 20px 60px rgba(0,0,0,0.15);
            --gold: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(15, 52, 96, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            background: var(--card);
            border-radius: 28px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            padding: 35px 30px;
            width: 100%;
            max-width: 520px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 36px;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #e94560, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .logo-sub {
            font-size: 12px;
            color: #94a3b8;
            letter-spacing: 4px;
            margin-top: 2px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .header .subtitle {
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 7px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label .emoji {
            font-size: 16px;
        }

        select, input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 15px;
            background: #f8fafc;
            color: var(--text);
            transition: all 0.3s ease;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            font-family: inherit;
        }

        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%231a1a2e' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: left 14px center;
            background-size: 16px 12px;
            padding-left: 40px;
        }

        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.08);
            background: #fff;
        }

        .radio-group {
            display: flex;
            gap: 10px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 1;
        }

        .radio-option label {
            display: block;
            text-align: center;
            padding: 12px;
            background: #f8fafc;
            border: 2px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #64748b;
            font-size: 14px;
        }

        .radio-option input:checked + label {
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: white;
            border-color: #e94560;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.25);
        }

        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f59e0b, #e67e22);
            color: #1a1a2e;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.35);
            position: relative;
            overflow: hidden;
        }

        .calculate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(245, 158, 11, 0.5);
        }

        .calculate-btn:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        .calculate-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .results {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 18px;
            padding: 22px;
            display: none;
            animation: slideDown 0.5s ease;
            border: 1px solid #e2e8f0;
        }

        .results.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item {
            text-align: center;
            margin-bottom: 14px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .result-value {
            font-size: 34px;
            font-weight: 900;
            color: var(--primary);
        }

        .result-value.trader {
            color: #ef4444;
        }

        .result-value.fair {
            color: #10b981;
        }

        .divider {
            border: none;
            border-top: 2px dashed #cbd5e1;
            margin: 14px 0;
        }

        .advice {
            background: white;
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            margin-top: 14px;
            line-height: 1.5;
        }

        .advice.good {
            color: #059669;
            border: 2px solid #10b981;
            background: #ecfdf5;
        }

        .advice.bad {
            color: #dc2626;
            border: 2px solid #ef4444;
            background: #fef2f2;
        }

        .advice.warning {
            color: #d97706;
            border: 2px solid #f59e0b;
            background: #fffbeb;
        }

        .dimensions-group {
            display: flex;
            gap: 10px;
        }

        .dimensions-group .dimension {
            flex: 1;
        }

        .dimension input {
            width: 100%;
        }

        .hint-text {
            color: #94a3b8;
            display: block;
            margin-top: 5px;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        /* Footer Signatures */
        .footer {
            text-align: center;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 2px solid #f1f5f9;
        }

        .footer .brand {
            font-weight: 900;
            font-size: 16px;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .footer .brand span {
            color: #e94560;
        }

        .footer .credit {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
            font-weight: 600;
        }

        .footer .credit .name {
            color: #0f3460;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .footer .disclaimer {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 8px;
        }

        @media (max-width: 400px) {
            .container {
                padding: 20px 15px;
                border-radius: 20px;
            }
            .result-value {
                font-size: 28px;
            }
            .logo-icon {
                width: 55px;
                height: 55px;
                font-size: 28px;
            }
            .logo-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- شعار SPE -->
        <div class="logo-area">
            <div class="logo-icon">SPE</div>
            <div class="logo-text">SPE</div>
            <div class="logo-sub">SAAD PRO ESTIMATE</div>
        </div>

        <div class="header">
            <h1>🏗️ حاسبة الأسعار العادلة</h1>
            <p class="subtitle">قارن سعر التاجر بالسعر العادل في السوق بذكاء</p>
        </div>

        <!-- 1. القسم الرئيسي -->
        <div class="form-group">
            <label><span class="emoji">📂</span> القسم الرئيسي</label>
            <select id="category" onchange="updateSubcategories()">
                <option value="">-- اختر القسم --</option>
                <option value="kitchen">مطابخ</option>
                <option value="flooring">أرضيات</option>
                <option value="paint">دهانات وجدران</option>
                <option value="furniture">أثاث</option>
                <option value="doors">أبواب</option>
                <option value="windows">شبابيك</option>
                <option value="railing">دربزين ودرج</option>
                <option value="curtains">ستائر ومفروشات</option>
                <option value="ceiling">أسقف وديكورات</option>
                <option value="marble">رخام وحجر</option>
            </select>
        </div>

        <!-- 2. نوع المادة -->
        <div class="form-group">
            <label><span class="emoji">🧱</span> نوع المادة</label>
            <select id="material" onchange="updateUnitHint()">
                <option value="">-- اختر النوع أولاً --</option>
            </select>
        </div>

        <!-- 3. الأبعاد -->
        <div class="form-group">
            <label><span class="emoji">📏</span> الأبعاد</label>
            <div class="dimensions-group" id="dimensionsContainer">
                <div class="dimension">
                    <input type="number" id="length" placeholder="الطول (متر)" step="0.01" min="0">
                </div>
                <div class="dimension" id="widthContainer">
                    <input type="number" id="width" placeholder="العرض (متر)" step="0.01" min="0">
                </div>
            </div>
            <small class="hint-text" id="unitHint">اختر القسم ونوع المادة لمعرفة وحدة القياس المناسبة</small>
        </div>

        <!-- 4. سعر الوحدة من التاجر -->
        <div class="form-group">
            <label><span class="emoji">💰</span> سعر الوحدة من التاجر (ريال)</label>
            <input type="number" id="traderPrice" placeholder="أدخل سعر المتر الذي قاله التاجر" step="0.01" min="0">
        </div>

        <!-- 5. نوع المتر -->
        <div class="form-group">
            <label><span class="emoji">📐</span> نوع الحساب</label>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" name="measureType" value="linear" id="linear" checked>
                    <label for="linear">متر طولي</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="measureType" value="square" id="square">
                    <label for="square">متر مربع</label>
                </div>
            </div>
        </div>

        <!-- 6. زر الحساب -->
        <button class="calculate-btn" onclick="calculatePrice()">
            🧮 احسب السعر العادل
        </button>

        <!-- النتائج -->
        <div class="results" id="results">
            <div class="result-item">
                <div class="result-label">💵 سعر التاجر الإجمالي</div>
                <div class="result-value trader" id="traderTotal">0 ريال</div>
            </div>
            <hr class="divider">
            <div class="result-item">
                <div class="result-label">✅ السعر العادل في السوق</div>
                <div class="result-value fair" id="fairTotal">0 ريال</div>
                <small style="color: #64748b; font-weight: 600;" id="fairRange"></small>
            </div>
            <div class="advice" id="advice"></div>
        </div>

        <!-- توقيع المطور -->
        <div class="footer">
            <div class="brand"><span>S</span>PE</div>
            <div class="credit">
                إعداد: <span class="name">سعد علي سعد القرني</span>
            </div>
            <div class="disclaimer">
                ⚠️ الأسعار العادلة تقديرية وقد تختلف حسب المنطقة والجودة
            </div>
        </div>
    </div>

                    'natural-marble': { name: 'رخام طبيعي', unit: 'square', fairPrice: 250, range: '180 - 400', hint: 'السعر بالمتر المربع شامل التركيب' },
                    'industrial-marble': { name: 'رخام صناعي', unit: 'square', fairPrice: 180, range: '130 - 250', hint: 'السعر بالمتر المربع' },
                    'granite': { name: 'جرانيت', unit: 'square', fairPrice: 300, range: '220 - 450', hint: 'السعر بالمتر المربع' }
                }
            }
        };

        // تحديث القائمة الفرعية للمواد
        function updateSubcategories() {
            const category = document.getElementById('category').value;
            const materialSelect = document.getElementById('material');
            
            materialSelect.innerHTML = '<option value="">-- اختر النوع --</option>';
            
            if (!category || !fairPriceDatabase[category]) {
                document.getElementById('unitHint').textContent = 'اختر القسم ونوع المادة لمعرفة وحدة القياس المناسبة';
                return;
            }

            const materials = fairPriceDatabase[category].materials;
            for (const [key, value] of Object.entries(materials)) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = value.name;
                materialSelect.appendChild(option);
            }
            
            document.getElementById('unitHint').textContent = 'اختر نوع المادة لمعرفة وحدة القياس';
        }

        // تحديث تلميح وحدة القياس
        function updateUnitHint() {
            const category = document.getElementById('category').value;
            const material = document.getElementById('material').value;
            const hintElement = document.getElementById('unitHint');
            const widthContainer = document.getElementById('widthContainer');
            
            if (!category || !material || !fairPriceDatabase[category] || !fairPriceDatabase[category].materials[material]) {
                hintElement.textContent = 'اختر القسم ونوع المادة لمعرفة وحدة القياس المناسبة';
                widthContainer.style.display = 'block';
                return;
            }

            const materialData = fairPriceDatabase[category].materials[material];
            hintElement.textContent = '💡 ' + materialData.hint;
            
            // إظهار/إخفاء حقل العرض حسب نوع القياس
            const measureType = document.querySelector('input[name="measureType"]:checked').value;
            if (measureType === 'linear') {
                widthContainer.style.display = 'none';
                document.getElementById('width').value = '';
            } else {
                widthContainer.style.display = 'block';
            }
        }

        // تحديث عرض حقل العرض عند تغيير نوع القياس
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('input[name="measureType"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    const widthContainer = document.getElementById('widthContainer');
                    if (this.value === 'linear') {
                        widthContainer.style.display = 'none';
                        document.getElementById('width').value = '';
                    } else {
                        widthContainer.style.display = 'block';
                    }
                    updateUnitHint();
                });
            });
        });

        // دالة الحساب الرئيسية
        function calculatePrice() {
            const category = document.getElementById('category').value;
            const material = document.getElementById('material').value;
            const length = parseFloat(document.getElementById('length').value);
            const width = parseFloat(document.getElementById('width').value);
            const traderPricePerUnit = parseFloat(document.getElementById('traderPrice').value);
            const measureType = document.querySelector('input[name="measureType"]:checked').value;
            const resultsDiv = document.getElementById('results');

            // التحقق من المدخلات
            if (!category) {
                alert('الرجاء اختيار القسم الرئيسي');
                return;
            }
            if (!material) {
                alert('الرجاء اختيار نوع المادة');
                return;
            }
            if (isNaN(length) || length <= 0) {
                alert('الرجاء إدخال الطول الصحيح');
                return;
            }
            if (measureType === 'square' && (isNaN(width) || width <= 0)) {
                alert('الرجاء إدخال العرض الصحيح للحساب بالمتر المربع');
                return;
            }
            if (isNaN(traderPricePerUnit) || traderPricePerUnit <= 0) {
                alert('الرجاء إدخال سعر الوحدة من التاجر');
                return;
            }

            // حساب المساحة
            let area;
            if (measureType === 'square') {
                area = length * width;
            } else {
                area = length; // متر طولي
            }

            // سعر التاجر الإجمالي
            const traderTotal = area * traderPricePerUnit;

            // السعر العادل من قاعدة البيانات
            const materialData = fairPriceDatabase[category].materials[material];
            const fairPricePerUnit = materialData.fairPrice;
            const fairTotal = area * fairPricePerUnit;

            // عرض النتائج
            document.getElementById('traderTotal').textContent = traderTotal.toLocaleString('ar-SA') + ' ريال';
            document.getElementById('fairTotal').textContent = fairTotal.toLocaleString('ar-SA') + ' ريال';
            document.getElementById('fairRange').textContent = 'النطاق العادل: ' + materialData.range + ' ريال';
            
            // النصيحة
            const adviceElement = document.getElementById('advice');
            const difference = traderTotal - fairTotal;
            const percentageDiff = (difference / fairTotal) * 100;

            adviceElement.className = 'advice';
            if (percentageDiff <= 10 && percentageDiff >= -10) {
                adviceElement.classList.add('good');
                adviceElement.textContent = '✅ سعر ممتاز! الفرق في حدود 10% من السعر العادل. يمكنك التعاقد بثقة.';
            } else if (traderTotal < fairTotal) {
                adviceElement.classList.add('good');
                adviceElement.textContent = '🎉 عرض مغري! السعر أقل من العادل بنسبة ' + Math.abs(percentageDiff).toFixed(0) + '%. تأكد من جودة المواد.';
            } else if (percentageDiff <= 25) {
                adviceElement.classList.add('warning');
                adviceElement.textContent = '⚠️ السعر أعلى من العادل بنسبة ' + percentageDiff.toFixed(0) + '%. حاول المساومة للحصول على خصم.';
            } else {
                adviceElement.classList.add('bad');
                adviceElement.textContent = '🔴 السعر مرتفع جداً! الفرق ' + percentageDiff.toFixed(0) + '%. ننصح بالبحث عن تاجر آخر.';
            }

            // إظهار النتائج
            resultsDiv.classList.add('show');
            
            // التمرير إلى النتائج
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
