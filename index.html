<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الأسعار العادلة - للبناء والتشطيب</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e67e22;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2c3e50;
            --border: #dcdde1;
            --fair-price: #27ae60;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            font-family: inherit;
        }

        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%232c3e50' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: left 12px center;
            background-size: 16px 12px;
            padding-left: 40px;
        }

        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 10px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 1;
        }

        .radio-option label {
            display: block;
            text-align: center;
            padding: 12px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #7f8c8d;
        }

        .radio-option input:checked + label {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
            font-weight: 700;
        }

        .calculate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 20px rgba(230, 126, 34, 0.3);
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.4);
        }

        .calculate-btn:active {
            transform: translateY(0);
        }

        .results {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 16px;
            padding: 20px;
            display: none;
            animation: slideDown 0.4s ease;
        }

        .results.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item {
            text-align: center;
            margin-bottom: 15px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
        }

        .result-value.trader {
            color: #e74c3c;
        }

        .result-value.fair {
            color: var(--fair-price);
        }

        .divider {
            border: none;
            border-top: 2px dashed #dcdde1;
            margin: 15px 0;
        }

        .advice {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            margin-top: 15px;
        }

        .advice.good {
            color: #27ae60;
            border: 2px solid #27ae60;
        }

        .advice.bad {
            color: #e74c3c;
            border: 2px solid #e74c3c;
            background: #fdf2f2;
        }

        .advice.warning {
            color: #f39c12;
            border: 2px solid #f39c12;
            background: #fef9e7;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #bdc3c7;
            font-size: 12px;
        }

        .dimensions-group {
            display: flex;
            gap: 10px;
        }

        .dimensions-group .dimension {
            flex: 1;
        }

        .dimension input {
            width: 100%;
        }

        @media (max-width: 400px) {
            .container {
                padding: 20px;
            }
            .result-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🏗️</div>
            <h1>حاسبة الأسعار العادلة</h1>
            <p>قارن سعر التاجر بالسعر العادل في السوق</p>
        </div>

        <!-- 1. القسم الرئيسي -->
        <div class="form-group">
            <label>📂 القسم الرئيسي</label>
            <select id="category" onchange="updateSubcategories()">
                <option value="">-- اختر القسم --</option>
                <option value="kitchen">مطابخ</option>
                <option value="flooring">أرضيات</option>
                <option value="paint">دهانات وجدران</option>
                <option value="furniture">أثاث</option>
                <option value="doors">أبواب</option>
                <option value="windows">شبابيك</option>
                <option value="railing">دربزين ودرج</option>
                <option value="curtains">ستائر ومفروشات</option>
                <option value="ceiling">أسقف وديكورات</option>
                <option value="marble">رخام وحجر</option>
            </select>
        </div>

        <!-- 2. نوع المادة -->
        <div class="form-group">
            <label>🧱 نوع المادة</label>
            <select id="material" onchange="updateUnitHint()">
                <option value="">-- اختر النوع أولاً --</option>
            </select>
        </div>

        <!-- 3. الأبعاد -->
        <div class="form-group">
            <label>📏 الأبعاد</label>
            <div class="dimensions-group" id="dimensionsContainer">
                <div class="dimension">
                    <input type="number" id="length" placeholder="الطول (متر)" step="0.01" min="0">
                </div>
                <div class="dimension" id="widthContainer">
                    <input type="number" id="width" placeholder="العرض (متر)" step="0.01" min="0">
                </div>
            </div>
            <small style="color: #7f8c8d; display: block; margin-top: 5px;" id="unitHint">اختر القسم ونوع المادة لمعرفة وحدة القياس المناسبة</small>
        </div>

        <!-- 4. سعر المتر من التاجر -->
        <div class="form-group">
            <label>💰 سعر الوحدة من التاجر (ريال/للمتر)</label>
            <input type="number" id="traderPrice" placeholder="أدخل سعر المتر الذي قاله التاجر" step="0.01" min="0">
        </div>

        <!-- 5. نوع المتر -->
        <div class="form-group">
            <label>📐 نوع الحساب</label>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" name="measureType" value="linear" id="linear" checked>
                    <label for="linear">متر طولي</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="measureType" value="square" id="square">
                    <label for="square">متر مربع</label>
                </div>
            </div>
        </div>

        <!-- 6. زر الحساب -->
        <button class="calculate-btn" onclick="calculatePrice()">
            🧮 احسب السعر العادل
        </button>

        <!-- النتائج -->
        <div class="results" id="results">
            <div class="result-item">
                <div class="result-label">💵 سعر التاجر الإجمالي</div>
                <div class="result-value trader" id="traderTotal">0 ريال</div>
            </div>
            <hr class="divider">
            <div class="result-item">
                <div class="result-label">✅ السعر العادل في السوق</div>
                <div class="result-value fair" id="fairTotal">0 ريال</div>
                <small style="color: #7f8c8d;" id="fairRange"></small>
            </div>
            <div class="advice" id="advice"></div>
        </div>

        <div class="footer">
            الأسعار العادلة تقديرية وقد تختلف حسب المنطقة والجودة ⚠️
        </div>
    </div>

    <script>
        // ============ قاعدة بيانات الأسعار العادلة ============
        // الأسعار بالريال السعودي (تقديرية - يمكنك تعديلها)
        const fairPriceDatabase = {
            kitchen: {
                name: 'مطابخ',
                materials: {
                    'poly-lac': { name: 'بولي لاك', unit: 'linear', fairPrice: 900, range: '800 - 1200', hint: 'السعر بالمتر الطولي (يشمل التركيب)' },
                    'stainless': { name: 'استانلس ستيل', unit: 'linear', fairPrice: 1500, range: '1200 - 2000', hint: 'السعر بالمتر الطولي' },
                    'aluminum-cladding': { name: 'ألمنيوم كلادينج', unit: 'linear', fairPrice: 1100, range: '900 - 1400', hint: 'السعر بالمتر الطولي' },
                    'acrylic': { name: 'أكريليك', unit: 'linear', fairPrice: 1300, range: '1100 - 1600', hint: 'السعر بالمتر الطولي' },
                    'wood-painted': { name: 'خشب مطلي (دوكو)', unit: 'linear', fairPrice: 700, range: '600 - 900', hint: 'السعر بالمتر الطولي' },
                    'pvc': { name: 'PVC تركي', unit: 'linear', fairPrice: 500, range: '400 - 650', hint: 'السعر بالمتر الطولي' }
                }
            },
            flooring: {
                name: 'أرضيات',
                materials: {
                    'ceramic': { name: 'سيراميك', unit: 'square', fairPrice: 45, range: '30 - 70', hint: 'السعر بالمتر المربع شامل التركيب' },
                    'porcelain': { name: 'بورسلان', unit: 'square', fairPrice: 65, range: '45 - 100', hint: 'السعر بالمتر المربع شامل التركيب' },
                    'parquet': { name: 'باركيه خشب', unit: 'square', fairPrice: 120, range: '80 - 180', hint: 'السعر بالمتر المربع شامل التركيب' },
                    'vinyl': { name: 'فينيل (PVC)', unit: 'square', fairPrice: 55, range: '40 - 80', hint: 'السعر بالمتر المربع شامل التركيب' },
                    'epoxy': { name: 'إيبوكسي', unit: 'square', fairPrice: 90, range: '60 - 130', hint: 'السعر بالمتر المربع' },
                    'marble-floor': { name: 'رخام طبيعي', unit: 'square', fairPrice: 200, range: '150 - 350', hint: 'السعر بالمتر المربع شامل التركيب' }
                }
            },
            paint: {
                name: 'دهانات وجدران',
                materials: {
                    'interior-paint': { name: 'دهان داخلي عادي', unit: 'square', fairPrice: 12, range: '8 - 18', hint: 'السعر بالمتر المربع (يشمل المعجون والصنفرة)' },
                    'decorative-paint': { name: 'دهان ديكوري (إسفنجي/رول)', unit: 'square', fairPrice: 25, range: '18 - 35', hint: 'السعر بالمتر المربع' },
                    'wallpaper': { name: 'ورق جدران', unit: 'square', fairPrice: 40, range: '25 - 70', hint: 'السعر بالمتر المربع شامل التركيب' },
                    'gypsum-paint': { name: 'دهان على الجبس', unit: 'square', fairPrice: 20, range: '15 - 28', hint: 'السعر بالمتر المربع' }
                }
            },
            furniture: {
                name: 'أثاث',
                materials: {
                    'sofa-fabric': { name: 'كنب قماش', unit: 'linear', fairPrice: 800, range: '600 - 1200', hint: 'السعر بالمتر الطولي' },
                    'sofa-leather': { name: 'كنب جلد', unit: 'linear', fairPrice: 1500, range: '1200 - 2500', hint: 'السعر بالمتر الطولي' },
                    'bedroom-set': { name: 'غرفة نوم كاملة', unit: 'linear', fairPrice: 2500, range: '1800 - 4000', hint: 'السعر التقديري للغرفة المتوسطة' },
                    'custom-cabinet': { name: 'دواليب مخصصة', unit: 'linear', fairPrice: 1100, range: '800 - 1500', hint: 'السعر بالمتر الطولي' }
                }
            },
            doors: {
                name: 'أبواب',
                materials: {
                    'wood-door': { name: 'باب خشب مصفح', unit: 'linear', fairPrice: 800, range: '600 - 1200', hint: 'السعر للباب الواحد (قياسي)' },
                    'iron-door': { name: 'باب حديد', unit: 'linear', fairPrice: 1500, range: '1200 - 2500', hint: 'السعر للباب الواحد' },
                    'security-door': { name: 'باب أمان', unit: 'linear', fairPrice: 2500, range: '1800 - 4000', hint: 'السعر للباب الواحد' },
                    'room-door': { name: 'باب غرفة', unit: 'linear', fairPrice: 450, range: '300 - 700', hint: 'السعر للباب الواحد' }
                }
            },
            windows: {
                name: 'شبابيك',
                materials: {
                    'aluminum-window': { name: 'شباك ألمنيوم', unit: 'square', fairPrice: 350, range: '250 - 500', hint: 'السعر بالمتر المربع' },
                    'pvc-window': { name: 'شباك PVC', unit: 'square', fairPrice: 450, range: '350 - 650', hint: 'السعر بالمتر المربع' },
                    'iron-window': { name: 'شباك حديد', unit: 'square', fairPrice: 280, range: '200 - 400', hint: 'السعر بالمتر المربع' }
                }
            },
            railing: {
                name: 'دربزين ودرج',
                materials: {
                    'iron-railing': { name: 'دربزين حديد', unit: 'linear', fairPrice: 350, range: '250 - 500', hint: 'السعر بالمتر الطولي' },
                    'stainless-railing': { name: 'دربزين استيل', unit: 'linear', fairPrice: 550, range: '400 - 750', hint: 'السعر بالمتر الطولي' },
                    'glass-railing': { name: 'دربزين زجاج', unit: 'linear', fairPrice: 700, range: '500 - 1000', hint: 'السعر بالمتر الطولي' },
                    'wood-railing': { name: 'دربزين خشب', unit: 'linear', fairPrice: 450, range: '350 - 650', hint: 'السعر بالمتر الطولي' }
                }
            },
            curtains: {
                name: 'ستائر ومفروشات',
                materials: {
                    'fabric-curtain': { name: 'ستائر قماش', unit: 'square', fairPrice: 80, range: '50 - 150', hint: 'السعر بالمتر المربع' },
                    'blackout': { name: 'ستائر بلاك آوت', unit: 'square', fairPrice: 120, range: '80 - 180', hint: 'السعر بالمتر المربع' },
                    'carpet': { name: 'موكيت', unit: 'square', fairPrice: 45, range: '25 - 70', hint: 'السعر بالمتر المربع شامل التركيب' },
                    'rug': { name: 'سجاد', unit: 'square', fairPrice: 100, range: '60 - 200', hint: 'السعر بالمتر المربع' }
                }
            },
            ceiling: {
                name: 'أسقف وديكورات',
                materials: {
                    'gypsum-board': { name: 'جبس بورد عادي', unit: 'square', fairPrice: 70, range: '50 - 100', hint: 'السعر بالمتر المربع شامل التركيب' },
                    'gypsum-decor': { name: 'جبس بورد ديكوري', unit: 'square', fairPrice: 110, range: '80 - 150', hint: 'السعر بالمتر المربع' },
                    'stretch-ceiling': { name: 'سقف مشدود', unit: 'square', fairPrice: 150, range: '120 - 200', hint: 'السعر بالمتر المربع' }
                }
            },
            marble: {
                name: 'رخام وحجر',
                materials: {
                    'natural-marble': { name: 'رخام طبيعي', unit: 'square', fairPrice: 250, range: '180 - 400', hint: 'السعر بالمتر المربع شامل التركيب' },
                    'industrial-marble': { name: 'رخام صناعي', unit: 'square', fairPrice: 180, range: '130 - 250', hint: 'السعر بالمتر المربع' },
                    'granite': { name: 'جرانيت', unit: 'square', fairPrice: 300, range: '220 - 450', hint: 'السعر بالمتر المربع' }
                }
            }
        };

        // تحديث القائمة الفرعية للمواد
        function updateSubcategories() {
            const category = document.getElementById('category').value;
            const materialSelect = document.getElementById('material');
            
            materialSelect.innerHTML = '<option value="">-- اختر النوع --</option>';
            
            if (!category || !fairPriceDatabase[category]) {
                document.getElementById('unitHint').textContent = 'اختر القسم ونوع المادة لمعرفة وحدة القياس المناسبة';
                return;
            }

            const materials = fairPriceDatabase[category].materials;
            for (const [key, value] of Object.entries(materials)) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = value.name;
                materialSelect.appendChild(option);
            }
            
            document.getElementById('unitHint').textContent = 'اختر نوع المادة لمعرفة وحدة القياس';
        }

        // تحديث تلميح وحدة القياس
        function updateUnitHint() {
            const category = document.getElementById('category').value;
            const material = document.getElementById('material').value;
            const hintElement = document.getElementById('unitHint');
            const widthContainer = document.getElementById('widthContainer');
            
            if (!category || !material || !fairPriceDatabase[category] || !fairPriceDatabase[category].materials[material]) {
                hintElement.textContent = 'اختر القسم ونوع المادة لمعرفة وحدة القياس المناسبة';
                widthContainer.style.display = 'block';
                return;
            }

            const materialData = fairPriceDatabase[category].materials[material];
            hintElement.textContent = '💡 ' + materialData.hint;
            
            // إظهار/إخفاء حقل العرض حسب نوع القياس
            const measureType = document.querySelector('input[name="measureType"]:checked').value;
            if (measureType === 'linear') {
                widthContainer.style.display = 'none';
                document.getElementById('width').value = '';
            } else {
                widthContainer.style.display = 'block';
            }
        }

        // تحديث عرض حقل العرض عند تغيير نوع القياس
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('input[name="measureType"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    const widthContainer = document.getElementById('widthContainer');
                    if (this.value === 'linear') {
                        widthContainer.style.display = 'none';
                        document.getElementById('width').value = '';
                    } else {
                        widthContainer.style.display = 'block';
                    }
                    updateUnitHint();
                });
            });
        });

        // دالة الحساب الرئيسية
        function calculatePrice() {
            const category = document.getElementById('category').value;
            const material = document.getElementById('material').value;
            const length = parseFloat(document.getElementById('length').value);
            const width = parseFloat(document.getElementById('width').value);
            const traderPricePerUnit = parseFloat(document.getElementById('traderPrice').value);
            const measureType = document.querySelector('input[name="measureType"]:checked').value;
            const resultsDiv = document.getElementById('results');

            // التحقق من المدخلات
            if (!category) {
                alert('الرجاء اختيار القسم الرئيسي');
                return;
            }
            if (!material) {
                alert('الرجاء اختيار نوع المادة');
                return;
            }
            if (isNaN(length) || length <= 0) {
                alert('الرجاء إدخال الطول الصحيح');
                return;
            }
            if (measureType === 'square' && (isNaN(width) || width <= 0)) {
                alert('الرجاء إدخال العرض الصحيح للحساب بالمتر المربع');
                return;
            }
            if (isNaN(traderPricePerUnit) || traderPricePerUnit <= 0) {
                alert('الرجاء إدخال سعر الوحدة من التاجر');
                return;
            }

            // حساب المساحة
            let area;
            if (measureType === 'square') {
                area = length * width;
            } else {
                area = length; // متر طولي
            }

            // سعر التاجر الإجمالي
            const traderTotal = area * traderPricePerUnit;

            // السعر العادل من قاعدة البيانات
            const materialData = fairPriceDatabase[category].materials[material];
            const fairPricePerUnit = materialData.fairPrice;
            const fairTotal = area * fairPricePerUnit;

            // عرض النتائج
            document.getElementById('traderTotal').textContent = traderTotal.toLocaleString('ar-SA') + ' ريال';
            document.getElementById('fairTotal').textContent = fairTotal.toLocaleString('ar-SA') + ' ريال';
            document.getElementById('fairRange').textContent = 'النطاق العادل: ' + materialData.range + ' ريال';
            
            // النصيحة
            const adviceElement = document.getElementById('advice');
            const difference = traderTotal - fairTotal;
            const percentageDiff = (difference / fairTotal) * 100;

            adviceElement.className = 'advice';
            if (percentageDiff <= 10 && percentageDiff >= -10) {
                adviceElement.classList.add('good');
                adviceElement.textContent = '✅ سعر ممتاز! الفرق في حدود 10% من السعر العادل. يمكنك التعاقد بثقة.';
            } else if (traderTotal < fairTotal) {
                adviceElement.classList.add('good');
                adviceElement.textContent = '🎉 عرض مغري! السعر أقل من العادل بنسبة ' + Math.abs(percentageDiff).toFixed(0) + '%. تأكد من جودة المواد.';
            } else if (percentageDiff <= 25) {
                adviceElement.classList.add('warning');
                adviceElement.textContent = '⚠️ السعر أعلى من العادل بنسبة ' + percentageDiff.toFixed(0) + '%. حاول المساومة للحصول على خصم.';
            } else {
                adviceElement.classList.add('bad');
                adviceElement.textContent = '🔴 السعر مرتفع جداً! الفرق ' + percentageDiff.toFixed(0) + '%. ننصح بالبحث عن تاجر آخر.';
            }

            // إظهار النتائج
            resultsDiv.classList.add('show');
            
            // التمرير إلى النتائج
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
