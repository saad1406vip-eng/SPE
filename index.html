<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستشار التشطيب الذكي - SPN</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--primary); }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { text-align: center; color: var(--secondary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 8px; margin-top: 20px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px; display: none; }
        .price-tag { font-size: 24px; color: #c0392b; font-weight: bold; display: block; text-align: center; }
        .note { font-size: 12px; color: #666; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <h2>SPN Smart Estimator 🏠</h2>
    
    <label>اختر القسم:</label>
    <select id="category" onchange="updateSubCategories()">
        <option value="">-- اختر المجال --</option>
        <option value="kitchen">مطابخ (ألمنيوم، بولي لاك، ستانلس)</option>
        <option value="flooring">أرضيات (بورسلان، باركيه، رخام)</option>
        <option value="furniture">مفروشات (كنب، موكيت)</option>
        <option value="bedroom">نجارة (غرف نوم، دولاب ملابس)</option>
    </select>

    <label>نوع المادة / الخامة:</label>
    <select id="subCategory"></select>

    <div id="dimensions">
        <label id="labelL">الطول (متر طولي):</label>
        <input type="number" id="length" step="0.1" placeholder="مثال: 8.1">
        
        <div id="heightDiv">
            <label>الارتفاع (متر):</label>
            <input type="number" id="height" step="0.1" value="2.8" placeholder="مثال: 2.8">
        </div>
    </div>

    <button onclick="calculatePrice()">احسب السعر العادل</button>

    <div id="result">
        <span id="resText">السعر التقديري العادل:</span>
        <span class="price-tag" id="totalPrice">0 ريال</span>
        <div class="note" id="resNote"></div>
    </div>
</div>

<script>
    const data = {
        kitchen: {
            "بولي لاك (Polylac)": { price: 1200, unit: "m2", note: "السعر شامل الرخام الصناعي والمفصلات الهيدروليك." },
            "ستانلس ستيل 304": { price: 1450, unit: "m2", note: "مضاد للبكتيريا والصدأ، مثالي للمطابخ المركزية." },
            "ألمنيوم كلادينج دبل": { price: 1050, unit: "m2", note: "خيار عملي جداً، تأكد من جودة الحشوة الداخلية." },
            "أكريليك": { price: 950, unit: "m2", note: "جميل اللمعة لكنه حساس للخدش." }
        },
        flooring: {
            "بورسلان إسباني": { price: 180, unit: "m2", note: "شامل المواد والتركيب (غراء) بجودة عالية." },
            "باركيه هرمي (SPC)": { price: 95, unit: "m2", note: "مقاوم للماء والخدش، شامل النعلات واللباد." },
            "رخام طبيعي (كريما مارفل)": { price: 350, unit: "m2", note: "شامل الجلي والتلميع والتركيب." }
        },
        furniture: {
            "كنب مودرن (إسفنج راجحي)": { price: 900, unit: "m", note: "خشب سويدي + قماش تركي متين." },
            "موكيت تركي كثيف": { price: 85, unit: "m2", note: "شامل اللباد والتركيب." }
        },
        bedroom: {
            "دولاب ملابس (خشب سنديان)": { price: 1100, unit: "m2", note: "حساب المساحة: الطول × الارتفاع." },
            "سرير كينج (تفصيل)": { price: 2800, unit: "fixed", note: "شامل الهيكل الخشبي والتنجيد بدون المرتبة." }
        }
    };

    function updateSubCategories() {
        const cat = document.getElementById("category").value;
        const subCat = document.getElementById("subCategory");
        const hDiv = document.getElementById("heightDiv");
        subCat.innerHTML = "";
        
        if(data[cat]) {
            Object.keys(data[cat]).forEach(item => {
                let opt = document.createElement("option");
                opt.value = item;
                opt.innerHTML = item;
                subCat.appendChild(opt);
            });
        }
        // إخفاء الارتفاع لبعض الأقسام
        hDiv.style.display = (cat === 'flooring' || cat === 'furniture') ? "none" : "block";
    }

    function calculatePrice() {
        const cat = document.getElementById("category").value;
        const item = document.getElementById("subCategory").value;
        const L = parseFloat(document.getElementById("length").value) || 0;
        const H = parseFloat(document.getElementById("height").value) || 1;
        
        if (!cat || !item || L === 0) { alert("لطفاً أدخل جميع البيانات"); return; }

        const info = data[cat][item];
        let total = 0;

        if (info.unit === "m2") {
            total = L * H * info.price;
        } else if (info.unit === "m") {
            total = L * info.price;
        } else {
            total = info.price; // سعر ثابت
        }

        document.getElementById("result").style.display = "block";
        document.getElementById("totalPrice").innerHTML = Math.round(total).toLocaleString() + " ريال";
        document.getElementById("resNote").innerHTML = "💡 نصيحة الخبير: " + info.note;
    }
</script>
</body>
</html>
